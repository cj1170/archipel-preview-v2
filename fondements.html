<div id="root"></div>
<script type="text/babel">
// React hooks from global
const { useState, useEffect, useRef } = React;



const COLORS = {

const Wrap = ({ children, max = 780, style = {} }) => (

const Chapeau = ({ children }) => (

/* ═══════════════════════════════════════════════════════
   [1] HERO
   ═══════════════════════════════════════════════════════ */
const HeroSection = () => (

);

/* ═══════════════════════════════════════════════════════
   [2] SALUTOGÉNÈSE
   ═══════════════════════════════════════════════════════ */
const SalutoSection = () => {
  const soc = [
    { name: "Compréhensibilité", concret: "Comprendre pourquoi mon médecin prescrit ce médicament. Savoir ce qui se passe dans mon corps.", archipel: "IRIS explique. Le Sherpa traduit. Le patient comprend — il n'obéit pas seulement." },
    { name: "Gérabilité", concret: "Sentir que j'ai les ressources pour faire face. Pas seul·e. Avoir quelqu'un à qui parler.", archipel: "Coordination des praticiens. Continuité de l'accompagnement. Jamais le patient sans relais." },
    { name: "Significativité", concret: "Trouver un sens à l'effort. Comprendre pourquoi changer quelque chose vaut la peine.", archipel: "Le parcours patient est un récit, pas un protocole. Le sens est construit avec lui." },
  ];
  return (
    <Section bg={COLORS.offwhite} style={{ padding: "80px 24px" }}>
      <Wrap max={780}>
        <h2 style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: "clamp(24px,3.5vw,36px)", fontWeight: 400, color: COLORS.navy, textAlign: "center", margin: "0 0 32px" }}>Le paradigme qui manque</h2>
        <div style={{ fontSize: "17px", color: COLORS.textDark, lineHeight: 1.7, fontFamily: "'DM Sans',sans-serif" }}>
          <p>Depuis deux siècles, la médecine moderne s'est construite autour d'une question : <em>qu'est-ce qui cause la maladie ?</em> Cette orientation — la pathogenèse — a produit des avancées extraordinaires. Elle a aussi laissé un angle mort immense.</p>
          <p>En 1979, le sociologue israélo-américain <strong>Aaron Antonovsky</strong> retourne la question. Étudiant des femmes qui avaient survécu aux camps de concentration et maintenu une santé psychologique stable malgré tout, il observe l'inexplicable : certaines personnes traversent des conditions extrêmes sans s'effondrer. Pourquoi ?</p>
          <p>Sa réponse fonde la <strong>Salutogénèse</strong> — du latin <em>salus</em> (santé) et du grec <em>genesis</em> (origine). Non plus « qu'est-ce qui cause la maladie ? » mais : <strong>« qu'est-ce qui crée et maintient la santé ? »</strong></p>
          <p>Antonovsky identifie un facteur central : le <strong>Sentiment de Cohérence</strong> (SOC — <em>Sense of Coherence</em>). Trois composantes — non pas des concepts abstraits, mais des expériences concrètes :</p>
        </div>

        <div style={{ overflowX: "auto", margin: "32px 0" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "15px", fontFamily: "'DM Sans',sans-serif" }}>
            <thead>
              <tr style={{ background: COLORS.navy }}>
                <th style={{ padding: "12px 16px", color: COLORS.gold, textAlign: "left", fontWeight: 600, width: "22%" }}>Composante</th>
                <th style={{ padding: "12px 16px", color: COLORS.gold, textAlign: "left", fontWeight: 600, width: "39%" }}>Ce que ça veut dire concrètement</th>
                <th style={{ padding: "12px 16px", color: COLORS.gold, textAlign: "left", fontWeight: 600, width: "39%" }}>Ce qu'ARCHIPEL en fait</th>
              </tr>
            </thead>
            <tbody>
              {soc.map((s, i) => (
                <tr key={i} style={{ background: i % 2 === 0 ? COLORS.ivory : COLORS.white }}>
                  <td style={{ padding: "14px 16px", fontWeight: 700, color: COLORS.navy, verticalAlign: "top" }}>{s.name}</td>
                  <td style={{ padding: "14px 16px", lineHeight: 1.6, verticalAlign: "top" }}>{s.concret}</td>
                  <td style={{ padding: "14px 16px", lineHeight: 1.6, verticalAlign: "top", color: COLORS.teal }}>{s.archipel}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <blockquote style={{ borderLeft: `4px solid ${COLORS.gold}`, paddingLeft: "20px", margin: "28px 0", fontStyle: "italic", color: COLORS.navy, fontSize: "17px", lineHeight: 1.7 }}>
          « ARCHIPEL structure chaque accompagnement pour renforcer ces trois composantes. Pas de façon théorique — de façon concrète, à chaque interaction. »
        </blockquote>
        <p style={{ fontSize: "17px", color: COLORS.textDark, lineHeight: 1.7, fontFamily: "'DM Sans',sans-serif" }}>
          C'est ce que le système de soin ne fait pas. Pas parce qu'il le refuse — mais parce qu'il n'a pas été conçu pour ça.
        </p>
        <p style={{ fontSize: "13px", color: COLORS.textLight, fontStyle: "italic", fontFamily: "'DM Sans',sans-serif" }}>
          Source : Antonovsky, A. (1979). <em>Health, Stress and Coping</em>. Jossey-Bass.
        </p>
      </Wrap>
    </Section>
  );
};

/* ═══════════════════════════════════════════════════════

        <blockquote style={{ borderLeft: `4px solid ${COLORS.gold}`, paddingLeft: "20px", margin: "40px auto 0", maxWidth: "720px", fontStyle: "italic", color: COLORS.navy, fontSize: "17px", lineHeight: 1.7, fontFamily: "'DM Sans',sans-serif" }}>
          « La plupart des approches de santé intégrative traitent TÊTE et CORPS. ARCHIPEL est construit autour de la conviction que CŒUR n'est pas un supplément — c'est une condition. »
        </blockquote>
        <p style={{ textAlign: "center", maxWidth: "720px", margin: "16px auto 0", fontSize: "16px", color: COLORS.textDark, lineHeight: 1.7, fontFamily: "'DM Sans',sans-serif" }}>
          Sans sécurité relationnelle, aucune transformation durable n'est possible. C'est ce que les neurosciences du lien (Porges, Bowlby) ont démontré, et ce que les traditions de soin holistique savaient depuis longtemps.
        </p>
      </Wrap>
    </Section>
  );
};

/* ═══════════════════════════════════════════════════════
