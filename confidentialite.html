<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confidentialité — ARCHIPEL Foundation</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
// React hooks from global
const { useState, useEffect, useRef } = React;

/* ═══════════════════════════════════════════════════════
   ARCHIPEL FOUNDATION — PAGE /CONFIDENTIALITE
   Politique de confidentialité — RGPD++
   Principe #5 : "Vos données vous appartiennent."
   Corrections : toutes réf. suisses supprimées, droit français
   ═══════════════════════════════════════════════════════ */

const C = {
  navy: "#0f1c2e", navyLight: "#152234",
  gold: "#dbb878", cream: "#ede3d6", teal: "#2a5a5e",
  white: "#ffffff", offwhite: "#faf8f5", ivory: "#f5f0e8",
  text: "#1a1a2e", textM: "#4a4a5a", textL: "#8a8a9a",
};
const GoldLine = ({ width = "60px", style = {} }) => (
  <div style={{ width, height: "1px", background: `linear-gradient(90deg, transparent, ${C.gold}, transparent)`, ...style }} />
);
const Wrap = ({ children, max = 780, style = {} }) => (
  <div style={{ maxWidth: `${max}px`, margin: "0 auto", padding: "0 24px", ...style }}>{children}</div>
);
const SectionTitle = ({ children }) => (
  <h2 style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: "24px", fontWeight: 600, color: C.teal, margin: "40px 0 16px" }}>{children}</h2>
);
const P = ({ children, style = {} }) => (
  <p style={{ fontFamily: "'DM Sans',sans-serif", fontSize: "15px", color: C.textM, lineHeight: 1.7, margin: "0 0 12px", ...style }}>{children}</p>
);

function Confidentialite() {
  const principes = [
    { title: "Propriété absolue", desc: "Vos données vous appartiennent. ARCHIPEL est dépositaire, jamais propriétaire. Vous pouvez les récupérer ou les supprimer à tout moment." },
    { title: "Hébergement européen", desc: "Toutes les données sont stockées exclusivement dans l'Union Européenne, sur des infrastructures certifiées." },
    { title: "Chiffrement natif", desc: "Chiffrement AES-256 au repos, TLS 1.3 en transit. Vos données sont protégées de bout en bout." },
    { title: "Pas de revente", desc: "Vos données ne sont JAMAIS monétisées, vendues ou partagées sans votre consentement explicite." },
    { title: "Minimisation", desc: "Nous ne collectons que les données strictement nécessaires au service. Rien de plus." },
    { title: "Transparence", desc: "Vous savez exactement quelles données sont collectées, pourquoi, et pendant combien de temps." },
  ];

  const droits = [
    { droit: "Accès", desc: "Obtenir une copie de toutes vos données personnelles détenues par ARCHIPEL." },
    { droit: "Rectification", desc: "Corriger toute donnée inexacte ou incomplète." },
    { droit: "Effacement", desc: "Demander la suppression de vos données (« droit à l'oubli »)." },
    { droit: "Portabilité", desc: "Recevoir vos données dans un format structuré et lisible par machine." },
    { droit: "Opposition", desc: "Vous opposer au traitement de vos données pour des motifs légitimes." },
    { droit: "Limitation", desc: "Demander la suspension du traitement de vos données." },
  ];

  return (
    <div style={{ fontFamily: "'DM Sans',sans-serif", color: C.text, background: C.cream, minHeight: "100vh" }}>
      <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet" />

      {/* HERO */}
      <section style={{ background: C.navy, padding: "80px 24px 50px", textAlign: "center" }}>
        <p style={{ fontFamily: "'DM Sans',sans-serif", fontSize: "12px", letterSpacing: "0.2em", color: C.gold, textTransform: "uppercase", margin: "0 0 16px" }}>Protection des données</p>
        <h1 style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: "clamp(28px,4vw,40px)", fontWeight: 300, color: C.ivory, margin: "0 0 20px" }}>Politique de confidentialité</h1>
        <blockquote style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: "18px", fontStyle: "italic", color: C.cream, opacity: 0.8, maxWidth: "560px", margin: "0 auto", borderLeft: `3px solid ${C.gold}`, paddingLeft: "16px", textAlign: "left" }}>
          « Vos données vous appartiennent. Nous en sommes les gardiens temporaires, jamais les propriétaires. »
        </blockquote>
      </section>

      {/* PRINCIPES RGPD++ */}
      <section style={{ background: C.cream, padding: "60px 24px" }}>
        <Wrap max={900}>
          <div style={{ textAlign: "center", marginBottom: "32px" }}>
            <p style={{ fontFamily: "'DM Sans',sans-serif", fontSize: "12px", letterSpacing: "0.15em", color: C.textL, textTransform: "uppercase", marginBottom: "8px" }}>Au-delà du RGPD</p>
            <h2 style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: "28px", fontWeight: 400, color: C.navy, marginBottom: "8px" }}>Nos 6 principes de protection</h2>
            <P style={{ maxWidth: "600px", margin: "0 auto", textAlign: "center" }}>Nous allons au-delà des exigences légales. La protection de vos données est inscrite dans notre ADN — c'est notre Principe fondateur n°5.</P>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(260px,1fr))", gap: "16px" }}>
            {principes.map((p, i) => (
              <div key={i} style={{ background: C.white, borderRadius: "4px", padding: "24px 20px", border: `1px solid rgba(219,184,120,0.15)` }}>
                <h3 style={{ fontFamily: "'DM Sans',sans-serif", fontSize: "16px", color: C.navy, fontWeight: 700, margin: "0 0 8px" }}>{p.title}</h3>
                <p style={{ fontFamily: "'DM Sans',sans-serif", fontSize: "14px", color: C.textM, lineHeight: 1.6, margin: 0 }}>{p.desc}</p>
              </div>
            ))}
          </div>
        </Wrap>
      </section>

      {/* DONNÉES COLLECTÉES */}
      <section style={{ background: C.offwhite, padding: "60px 24px" }}>
        <Wrap max={720}>
          <SectionTitle>Données collectées</SectionTitle>

          <h3 style={{ fontFamily: "'DM Sans',sans-serif", fontSize: "16px", color: C.navy, fontWeight: 600, margin: "24px 0 8px" }}>Données de navigation (site vitrine)</h3>
          <P>Ce site utilise <strong>Plausible Analytics</strong>, une solution d'analyse web hébergée dans l'Union Européenne (Allemagne). Plausible ne dépose aucun cookie, ne collecte aucune donnée personnelle, et ne permet pas l'identification individuelle des visiteurs.</P>
          <P style={{ fontSize: "13px", color: C.teal }}>Conséquence : aucune bannière de consentement cookies n'est nécessaire sur ce site.</P>

          <h3 style={{ fontFamily: "'DM Sans',sans-serif", fontSize: "16px", color: C.navy, fontWeight: 600, margin: "24px 0 8px" }}>Données de contact</h3>
          <P>Lorsque vous nous contactez via le formulaire de contact ou par email, nous collectons : nom, prénom, adresse email, et le contenu de votre message.</P>
          <P><strong>Conservation :</strong> 3 ans après le dernier contact. <strong>Base légale :</strong> consentement (art. 6.1.a RGPD).</P>

          <h3 style={{ fontFamily: "'DM Sans',sans-serif", fontSize: "16px", color: C.navy, fontWeight: 600, margin: "24px 0 8px" }}>Données newsletter</h3>
          <P>Si vous vous inscrivez à notre newsletter, nous collectons votre adresse email. Le service de newsletter est opéré par <strong>Brevo</strong> (ex-Sendinblue), hébergé dans l'Union Européenne, conforme RGPD.</P>
          <P><strong>Désinscription :</strong> lien de désinscription dans chaque email. <strong>Base légale :</strong> consentement (art. 6.1.a RGPD).</P>

          <h3 style={{ fontFamily: "'DM Sans',sans-serif", fontSize: "16px", color: C.navy, fontWeight: 600, margin: "24px 0 8px" }}>Données de santé (futurs membres ARCHIPEL)</h3>
          <div style={{ borderLeft: `3px solid ${C.gold}`, paddingLeft: "16px", margin: "12px 0" }}>
            <P style={{ fontStyle: "italic", color: C.navy }}>
              Les données de santé ne sont collectées que dans le cadre d'un accompagnement ARCHIPEL, avec consentement explicite. Elles sont chiffrées, hébergées sur une infrastructure certifiée HDS dans l'UE, et vous en conservez la propriété absolue.
            </P>
            <P style={{ fontSize: "13px", color: C.textL }}>⏳ La plateforme ARCHIPEL LIFE n'est pas encore opérationnelle. Cette section sera détaillée lors du lancement.</P>
          </div>
        </Wrap>
      </section>

      {/* VOS DROITS */}
      <section style={{ background: C.teal, padding: "60px 24px" }}>
        <Wrap max={800}>
          <h2 style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: "28px", fontWeight: 400, color: C.ivory, textAlign: "center", margin: "0 0 8px" }}>Vos droits</h2>
          <P style={{ color: C.cream, textAlign: "center", maxWidth: "600px", margin: "0 auto 28px", opacity: 0.85 }}>Conformément au RGPD (Règlement Général sur la Protection des Données), vous disposez des droits suivants :</P>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(240px,1fr))", gap: "12px" }}>
            {droits.map((d, i) => (
              <div key={i} style={{ background: "rgba(255,255,255,0.08)", borderRadius: "4px", padding: "18px 16px" }}>
                <h3 style={{ fontFamily: "'DM Sans',sans-serif", fontSize: "15px", color: C.gold, fontWeight: 700, margin: "0 0 6px" }}>Droit d'{d.droit.toLowerCase()}</h3>
                <p style={{ fontFamily: "'DM Sans',sans-serif", fontSize: "14px", color: C.cream, lineHeight: 1.6, margin: 0, opacity: 0.85 }}>{d.desc}</p>
              </div>
            ))}
          </div>
          <div style={{ textAlign: "center", marginTop: "28px" }}>
            <P style={{ color: C.cream, opacity: 0.8 }}>Pour exercer ces droits : <a href="mailto:contact@archipel.foundation" style={{ color: C.gold, textDecoration: "none" }}>contact@archipel.foundation</a></P>
            <P style={{ color: C.cream, opacity: 0.6, fontSize: "13px" }}>Vous pouvez également adresser une réclamation à la CNIL (Commission Nationale de l'Informatique et des Libertés) : <a href="https://www.cnil.fr" target="_blank" rel="noopener noreferrer" style={{ color: C.gold, textDecoration: "none" }}>www.cnil.fr</a></P>
          </div>
        </Wrap>
      </section>

      {/* SOUS-TRAITANTS */}
      <section style={{ background: C.offwhite, padding: "60px 24px" }}>
        <Wrap max={720}>
          <SectionTitle>Sous-traitants et partenaires</SectionTitle>
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "14px", fontFamily: "'DM Sans',sans-serif" }}>
              <thead>
                <tr style={{ background: C.navy }}>
                  {["Service", "Prestataire", "Localisation", "Données concernées"].map((h, i) => (
                    <th key={i} style={{ padding: "12px 14px", color: C.gold, textAlign: "left", fontWeight: 600 }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {[
                  ["Hébergement site", "Vercel", "UE + US", "Données de navigation (anonymisées)"],
                  ["Analytics", "Plausible", "UE (Allemagne)", "Aucune donnée personnelle"],
                  ["Newsletter", "Brevo", "UE (France)", "Email uniquement"],
                  ["Formulaire contact", "Next.js API Route", "Même hébergeur", "Nom, email, message"],
                  ["Données santé (futur)", "HDS certifié", "UE (France)", "Données santé chiffrées"],
                ].map(([service, presta, loc, data], i) => (
                  <tr key={i} style={{ background: i % 2 === 0 ? C.ivory : C.white }}>
                    <td style={{ padding: "10px 14px", fontWeight: 600, color: C.navy }}>{service}</td>
                    <td style={{ padding: "10px 14px", color: C.textM }}>{presta}</td>
                    <td style={{ padding: "10px 14px", color: C.teal, fontWeight: 500 }}>{loc}</td>
                    <td style={{ padding: "10px 14px", color: C.textM }}>{data}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </Wrap>
      </section>

      {/* TRANSFERTS + DURÉE */}
      <section style={{ background: C.cream, padding: "40px 24px 60px" }}>
        <Wrap max={720}>
          <SectionTitle>Transferts internationaux</SectionTitle>
          <P>L'hébergement du site vitrine (Vercel) peut impliquer un transit par des serveurs hors UE. Vercel est conforme au EU-US Data Privacy Framework. Les données de santé des futurs membres seront exclusivement hébergées dans l'UE sur infrastructure HDS.</P>

          <SectionTitle>Durée de conservation</SectionTitle>
          {[
            ["Données de contact (formulaire)", "3 ans après le dernier contact"],
            ["Données newsletter (email)", "Jusqu'à désinscription"],
            ["Données de navigation", "Non collectées (Plausible)"],
            ["Données de santé (futur)", "Durée de l'accompagnement + archivage légal"],
          ].map(([type, duree], i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid rgba(219,184,120,0.12)", flexWrap: "wrap", gap: "4px" }}>
              <span style={{ fontFamily: "'DM Sans',sans-serif", fontSize: "14px", color: C.navy, fontWeight: 600 }}>{type}</span>
              <span style={{ fontFamily: "'DM Sans',sans-serif", fontSize: "14px", color: C.textM }}>{duree}</span>
            </div>
          ))}

          <SectionTitle>Responsable du traitement</SectionTitle>
          <P>ARCHIPEL Foundation — Fondation de droit français</P>
          <P>Siège social : Paris, France (enregistrement en cours)</P>
          <P>Email : <a href="mailto:contact@archipel.foundation" style={{ color: C.teal, textDecoration: "none" }}>contact@archipel.foundation</a></P>
          <P style={{ fontSize: "13px", color: C.textL }}>⏳ Un DPO (Délégué à la Protection des Données) sera désigné lors du déploiement de la plateforme ARCHIPEL LIFE.</P>

          <div style={{ textAlign: "center", marginTop: "40px" }}>
            <P style={{ color: C.textL, fontSize: "13px" }}>Dernière mise à jour : mars 2026</P>
            <a href="/mentions-legales" style={{ fontFamily: "'DM Sans',sans-serif", fontSize: "14px", color: C.teal, textDecoration: "none" }}>→ Mentions légales</a>
          </div>
        </Wrap>
      </section>

      {/* FOOTER minimal */}
      <footer style={{ background: C.navyLight, padding: "28px 24px", textAlign: "center" }}>
        <p style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: "16px", color: C.gold, letterSpacing: "6px", marginBottom: "8px" }}>ARCHIPEL <span style={{ fontStyle: "italic", letterSpacing: "2px" }}>foundation</span></p>
        <p style={{ fontFamily: "'DM Sans',sans-serif", fontSize: "11px", color: "rgba(255,255,255,0.3)" }}>© 2026 ARCHIPEL Foundation · Fondation de droit français · Paris</p>
      </footer>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(Confidentialite));
</script>
</body>
</html>
