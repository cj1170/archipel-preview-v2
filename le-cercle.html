/* ═══════════════════════════════════════════════════════

const WhySection = () => {
  const proofs = [

      text: "Que les personnes qui restent en bonne santé ne sont pas celles qui ont accès au meilleur médecin — mais celles qui ont un sentiment de cohérence dans leur parcours. Qu'elles comprennent ce qui leur arrive, qu'elles sentent qu'elles ont les ressources pour faire face, et qu'elles trouvent un sens à l'effort.",
