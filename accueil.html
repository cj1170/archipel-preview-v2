/* ═══════════════════════════════════════════════════════
   ARCHIPEL FOUNDATION — PAGE /ACCUEIL
   V4 — Corrections critiques appliquées (04/03/2026)

   DELTA V3 → V4 :
   [FIX-01] H1 corrigé : "La santé se crée. Elle ne se subit pas."
            est l'IDÉAL (Niveau 1, Pathos, H1 manifeste).
            "Réinventer la santé. Pour qu'elle dure." est la BASELINE
            (Niveau 2, signature de marque sous le logo).
            Source : Architecture de Wording v3 (10/02/2026), §5.
   [FIX-02] Wording ConstatReponse : "symptomatiques sans diagnostic"
            → "symptomatiques mais pas malades"
            Source : Itération #9, positionnement cible validé.
   [FIX-03] Navigation grid étendue : +4 pages produites
            (/vision /approche /la-guilde /le-cercle).
            Grid 4x2 (8 cartes). Carte Life toujours différenciée.
   [FIX-04] Lien "Découvrir notre vision complète" → href="/vision"
            (était href="#", lien mort).
   [FIX-05] Nav grid + footer : toutes les pages produites — plus de
            "bientôt". Architecture complète.
            cursor not-allowed, mention italic gold "(bientôt)".
            Signal d'honnêteté institutionnelle.

   INCHANGÉ :
   - Triptyque v3 retravaillé : conservé (meilleur que DOCX brief)
   - 8 principes fondateurs mars 2026 : corrects, conservés
   - Palette, animations, IntersectionObserver : conservés
   - Floating dev brief : mis à jour V4
   ═══════════════════════════════════════════════════════ */

const COLORS = {
  navy: "#0f1c2e",
  navyLight: "#152234",
  gold: "#dbb878",
  goldLight: "#e8cc9a",
  cream: "#ede3d6",
  warmGray: "#f5f3ef",
  teal: "#2a5a5e",
  tealLight: "#3a7a7e",
  white: "#ffffff",
  textDark: "#1a1a2e",
  textMid: "#4a4a5a",
  textLight: "#8a8a9a",
};

const GoldLine = ({ width = "80px", style = {} }) => (
  <div style={{
    width, height: "1px",
    background: `linear-gradient(90deg, transparent, ${COLORS.gold}, transparent)`,
    ...style,
  }} />
);

const Section = ({ children, bg = "transparent", id, style = {} }) => {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) setVisible(true); },
      { threshold: 0.12 }
    );
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return (
    <section ref={ref} id={id} style={{
      background: bg,
      opacity: visible ? 1 : 0,
      transform: visible ? "translateY(0)" : "translateY(28px)",
      transition: "opacity 0.9s ease, transform 0.9s ease",
      ...style,
    }}>
      {children}
    </section>
  );
};

/* ═══════════════════════════════════════════════════════

            individu puisse{" "}

              créer activement sa santé
            </strong>.
          </p>
        </div>

        <div style={{
          flex: "1 1 420px", padding: "36px 20px 36px 36px",
          display: "flex", flexDirection: "column", justifyContent: "center",

        <p style={{

              onMouseLeave={e => {
                if (p.soon) return;
                e.currentTarget.style.borderColor = p.life ? COLORS.teal : "rgba(255,255,255,0.08)";
                e.currentTarget.style.transform = "none";
              }}
            >
              <h3 style={{
                fontFamily: "'DM Sans',sans-serif", fontSize: "15px",
                fontWeight: 600, color: p.life ? COLORS.tealLight : COLORS.white,
                marginBottom: "5px",
              }}>{p.t}{p.soon && <span style={{ fontStyle: "italic", fontSize: "12px", color: COLORS.gold, marginLeft: "8px", fontWeight: 400 }}>(bientôt)</span>}</h3>
              <p style={{
                fontFamily: "'Cormorant Garamond',serif",
                fontSize: "14.5px", color: COLORS.textLight,
              }}>{p.s}</p>
            </a>
          ))}
        </div>
      </div>
    </Section>
  );
};
