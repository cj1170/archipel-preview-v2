<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Approche — ARCHIPEL Foundation</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
// React hooks from global
const { useState, useEffect, useRef } = React;



const C = {
  navy: "#0f1c2e", gold: "#dbb878", cream: "#ede3d6", teal: "#2a5a5e",
  white: "#ffffff", offwhite: "#faf8f5", ivory: "#f5f0e8",
  text: "#1a1a1a", textM: "#555555", textL: "#888888",
};

const Wrap = ({ children, max = 780, style = {} }) => (
  <div style={{ maxWidth: `${max}px`, margin: "0 auto", padding: "0 24px", ...style }}>{children}</div>
);

/* ═══════════════════════════════════════════════════════
   [1] HERO — Logos — Fond blanc, rupture délibérée
   ═══════════════════════════════════════════════════════ */
const HeroSection = () => (
  <section style={{ background: C.navy, padding: "80px 24px 60px", minHeight: "45vh", display: "flex", alignItems: "center" }}>
    <Wrap max={680}>
      <p style={{ fontFamily: "'DM Sans',sans-serif", fontSize: "12px", letterSpacing: "0.2em", color: C.gold, textTransform: "uppercase", margin: "0 0 16px" }}>Notre approche</p>
      <h1 style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: "clamp(32px,5vw,48px)", fontWeight: 700, color: C.ivory, lineHeight: 1.15, margin: "0 0 24px" }}>
        L'ouverture sans le flou.
      </h1>
      <p style={{ fontFamily: "'DM Sans',sans-serif", fontSize: "19px", color: C.cream, lineHeight: 1.7, maxWidth: "680px", margin: "0 0 16px" }}>
        ARCHIPEL intègre toutes les pratiques de soin. Pas parce que toutes sont équivalentes — mais parce que vos patients les utilisent déjà. Notre rôle n'est pas de trier à votre place. C'est de vous donner les éléments pour choisir en connaissance de cause.
      </p>
      <p style={{ fontFamily: "'DM Sans',sans-serif", fontSize: "17px", color: "rgba(255,255,255,0.5)", lineHeight: 1.7, fontStyle: "italic" }}>
        Cette page explique comment nous prenons ces décisions. De manière transparente. Avec les limites que ça implique.
      </p>
    </Wrap>
  </section>
);

/* ═══════════════════════════════════════════════════════
   [2] LA TENSION NOMMÉE — Logos
   ═══════════════════════════════════════════════════════ */
const TensionSection = () => (
  <section style={{ background: C.offwhite, padding: "80px 24px" }}>
    <Wrap max={720}>
      <h2 style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: "clamp(24px,3.5vw,36px)", fontWeight: 400, color: C.navy, margin: "0 0 32px" }}>La vraie difficulté</h2>
      <div style={{ fontSize: "17px", color: C.text, lineHeight: 1.8, fontFamily: "'DM Sans',sans-serif" }}>
        <p>Il existe une tension réelle au cœur de ce que fait ARCHIPEL. Elle mérite d'être nommée directement.</p>

        <p>D'un côté : les patients combinent les pratiques. Pas parce qu'ils ignorent la médecine conventionnelle — mais parce qu'ils ont des besoins que le système conventionnel seul ne couvre pas. Ignorer cette réalité ne la fait pas disparaître. Elle la rend juste invisible — et donc dangereuse.</p>

        <p style={{ fontSize: "19px", color: C.teal, fontWeight: 500 }}>
          Un patient qui cache à son médecin qu'il voit un acupuncteur par peur du jugement est un patient en danger. Pas à cause de l'acupuncture. À cause du silence.
        </p>

        <p>De l'autre côté : toutes les pratiques ne sont pas équivalentes. Certaines ont des décennies d'études contrôlées randomisées (RCT — <em>Randomised Controlled Trials</em>, le standard de référence en recherche clinique). D'autres reposent sur des traditions empiriques millénaires sans ce type de validation formelle. D'autres encore n'ont que des témoignages anecdotiques. Ces différences existent. Les nier serait malhonnête.</p>

        <p>La question n'est donc pas : « Doit-on intégrer ou non les pratiques non-conventionnelles ? » — cette question est déjà tranchée par la réalité des patients. La question est : <strong>« Comment les intégrer de manière rigoureuse, transparente, et respectueuse de la personne ? »</strong></p>

        <p>C'est à cette question que répond l'approche ARCHIPEL.</p>
      </div>
      <blockquote style={{ borderLeft: `4px solid ${C.gold}`, paddingLeft: "20px", margin: "32px 0 0", fontStyle: "italic", color: C.navy, fontSize: "17px", lineHeight: 1.7, fontFamily: "'DM Sans',sans-serif", maxWidth: "700px" }}>
        « ARCHIPEL ne prétend pas que toutes les pratiques sont équivalentes. Il prétend que toutes méritent d'être intégrées dans un parcours coordonné — avec une information transparente sur leur niveau de preuve. Ce n'est pas du relativisme. C'est de la lucidité. »
      </blockquote>
    </Wrap>
  </section>
);

/* ═══════════════════════════════════════════════════════
   [3] 3 NIVEAUX DE PREUVE — Logos dense
   ═══════════════════════════════════════════════════════ */
const LevelsSection = () => {
  const levels = [
    {
      label: "Niveau 1", name: "Validé par la recherche clinique",
      desc: "Des études contrôlées randomisées (RCT) publiées dans des revues à comité de lecture documentent l'efficacité de cette pratique pour des indications précises.",
      says: "\"Cette pratique a fait l'objet d'études cliniques rigoureuses. Pour votre situation spécifique, voici ce que la recherche indique.\"",
      examples: "TCC pour troubles anxieux, ostéopathie pour certaines lombalgies chroniques, acupuncture médicale pour certaines douleurs chroniques (méta-analyses Cochrane disponibles).",
      color: C.teal,
    },
    {
      label: "Niveau 2", name: "Validé par l'expérience empirique structurée",
      desc: "Cette pratique s'appuie sur des traditions empiriques documentées, des retours d'expérience structurés, ou des études préliminaires (observationnelles, séries de cas).",
      says: "\"Cette pratique repose sur une tradition empirique sérieuse. Les études formelles sont limitées ou préliminaires. Voici ce qu'on sait — et ce qu'on ne sait pas encore.\"",
      examples: "Naturopathie (certains protocoles), hypnothérapie (certaines indications), sophrologie.",
      color: C.gold,
    },
    {
      label: "Niveau 3", name: "Pratique traditionnelle ou personnelle",
      desc: "Cette pratique s'inscrit dans une tradition culturelle, spirituelle ou personnelle. Elle n'a pas de validation clinique formelle au sens occidental — et cette absence ne signifie pas absence d'effet pour la personne qui la pratique.",
      says: "\"Cette pratique appartient à une tradition qui a sa propre logique et ses propres critères de validité. Il n'existe pas d'études cliniques RCT à ce jour. Si vous y recourez, nous l'intégrons dans votre parcours coordonné — avec votre consentement éclairé, et sans substitution à un soin conventionnel nécessaire.\"",
      examples: "MTC (Médecine Traditionnelle Chinoise), Ayurveda, soins énergétiques, pratiques spirituelles de soin.",
      color: C.navy,
    },
  ];
  return (
    <section style={{ background: C.white, padding: "80px 24px" }}>
      <Wrap max={860}>
        <h2 style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: "clamp(24px,3.5vw,36px)", fontWeight: 400, color: C.teal, margin: "0 0 8px" }}>Ce que nous regardons — et ce que nous disons</h2>
        <p style={{ fontSize: "17px", color: C.text, fontFamily: "'DM Sans',sans-serif", maxWidth: "720px", margin: "0 0 36px", lineHeight: 1.7 }}>
          Pour chaque pratique intégrée dans un parcours ARCHIPEL, nous évaluons son niveau de validation selon trois catégories. Ces catégories ne créent pas une hiérarchie de valeur — elles créent une <strong>hiérarchie d'information</strong>.
        </p>
        <div style={{ display: "flex", flexDirection: "column", gap: "16px" }}>
          {levels.map((l, i) => (
            <div key={i} style={{ background: C.offwhite, borderRadius: "8px", borderLeft: `4px solid ${l.color}`, padding: "24px 28px" }}>
              <div style={{ display: "flex", alignItems: "baseline", gap: "10px", marginBottom: "10px" }}>
                <span style={{ fontFamily: "'DM Sans',sans-serif", fontSize: "12px", letterSpacing: "0.15em", color: l.color, textTransform: "uppercase", fontWeight: 700 }}>{l.label}</span>
                <span style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: "20px", color: C.navy, fontWeight: 600 }}>{l.name}</span>
              </div>
              <p style={{ fontSize: "15px", color: C.text, lineHeight: 1.7, fontFamily: "'DM Sans',sans-serif", margin: "0 0 12px" }}>{l.desc}</p>
              <p style={{ fontSize: "15px", color: C.teal, lineHeight: 1.6, fontFamily: "'DM Sans',sans-serif", fontStyle: "italic", margin: "0 0 10px" }}>
                Ce qu'ARCHIPEL dit : {l.says}
              </p>
              <p style={{ fontSize: "13px", color: C.textL, fontFamily: "'DM Sans',sans-serif", margin: 0 }}>
                Exemples non exhaustifs : {l.examples}
              </p>
            </div>
          ))}
        </div>
        <div style={{ marginTop: "24px", padding: "16px 20px", background: C.ivory, borderRadius: "6px", fontSize: "15px", fontFamily: "'DM Sans',sans-serif", color: C.text, lineHeight: 1.7 }}>
          <strong style={{ color: C.navy }}>Ce que ce cadre ne dit pas :</strong> Il ne dit pas que le Niveau 3 est inférieur au Niveau 1. Il dit que le type de validation est différent. Ce que le cadre garantit, c'est que le patient sait dans quel registre il se trouve.
        </div>
        <blockquote style={{ borderLeft: `4px solid ${C.gold}`, paddingLeft: "20px", margin: "24px 0 0", fontStyle: "italic", color: C.navy, fontSize: "17px", lineHeight: 1.7, fontFamily: "'DM Sans',sans-serif" }}>
          « L'information sur le niveau de preuve n'est pas un jugement. C'est un outil d'autonomie. »
        </blockquote>
      </Wrap>
    </section>
  );
};

/* ═══════════════════════════════════════════════════════
   [4] RIGUEUR • TRANSPARENCE • NON-JUGEMENT — Logos→Ethos
   ═══════════════════════════════════════════════════════ */
const TriptyqueSection = () => {
  const principes = [
    {
      name: "RIGUEUR",
      means: "Pour chaque approche, nous évaluons, informons et contextualisons. Quand des études cliniques existent, elles sont partagées. Quand elles n'existent pas, c'est dit clairement.",
      forbids: "Présenter une pratique comme \"efficace\" sans préciser les conditions de validation. Permettre à Iris de formuler une affirmation thérapeutique sans base référencée.",
      allows: "Intégrer des pratiques de Niveau 2 ou 3 dans un parcours coordonné, dès lors que le patient est informé et que le gradient clinique s'applique.",
    },
    {
      name: "TRANSPARENCE",
      means: "Chaque personne accompagnée sait ce qui est validé par la recherche, ce qui relève de la tradition empirique, et ce qui est de l'ordre de l'expérience personnelle. Cette information n'est pas réservée aux praticiens.",
      forbids: "Créer une asymétrie d'information entre praticiens et patient. Taire le niveau de preuve par crainte de \"décourager\". Pratiquer une transparence à géométrie variable.",
      allows: "Si votre parcours inclut de la naturopathie, vous savez que certains protocoles ont une base empirique documentée et que d'autres n'ont pas encore été validés par des études contrôlées.",
    },
    {
      name: "NON-JUGEMENT",
      means: "ARCHIPEL ne classe pas les approches en \"bonnes\" ou \"mauvaises\". Un praticien de médecine traditionnelle n'est pas moins respecté qu'un médecin spécialiste. Leurs rôles sont différents.",
      forbids: "Dire à un patient qu'il a tort de consulter un praticien de Niveau 3. Dénigrer une pratique face au patient. Laisser entendre qu'ARCHIPEL recommande une pratique plutôt qu'une autre.",
      allows: "Non-jugement ≠ non-information. Un patient qui veut remplacer un traitement conventionnel par du Niveau 3 reçoit une information complète sur les implications cliniques. C'est la responsabilisation, pas l'abandon.",
    },
  ];
  return (
    <section style={{ background: C.cream, padding: "80px 24px" }}>
      <Wrap max={860}>
        <h2 style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: "clamp(24px,3.5vw,36px)", fontWeight: 400, color: C.navy, margin: "0 0 8px" }}>Trois principes. Pas trois valeurs.</h2>
        <p style={{ fontSize: "17px", color: C.text, fontFamily: "'DM Sans',sans-serif", maxWidth: "720px", margin: "0 0 36px", lineHeight: 1.7 }}>
          Validés collectivement en février 2026 par l'équipe fondatrice, dont notre CMedO Dr Anne-Sophie Darrigade. Ce ne sont pas des valeurs affichées. Ce sont des <strong>contraintes opérationnelles</strong> inscrites dans notre cadre déontologique.
        </p>
        <div style={{ display: "flex", flexDirection: "column", gap: "24px" }}>
          {principes.map((p, i) => (
            <div key={i} style={{ background: C.white, borderRadius: "8px", padding: "28px 24px" }}>
              <h3 style={{ fontFamily: "'DM Sans',sans-serif", fontSize: "16px", letterSpacing: "0.15em", color: C.gold, textTransform: "uppercase", margin: "0 0 16px", fontWeight: 700 }}>{p.name}</h3>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(240px,1fr))", gap: "16px", fontSize: "14px", fontFamily: "'DM Sans',sans-serif" }}>
                <div>
                  <p style={{ color: C.textL, fontSize: "11px", textTransform: "uppercase", letterSpacing: "0.1em", margin: "0 0 6px", fontWeight: 600 }}>Ce que ça signifie</p>
                  <p style={{ color: C.text, lineHeight: 1.6, margin: 0 }}>{p.means}</p>
                </div>
                <div>
                  <p style={{ color: "#c0392b", fontSize: "11px", textTransform: "uppercase", letterSpacing: "0.1em", margin: "0 0 6px", fontWeight: 600 }}>Ce que ça interdit</p>
                  <p style={{ color: C.text, lineHeight: 1.6, margin: 0 }}>{p.forbids}</p>
                </div>
                <div>
                  <p style={{ color: C.teal, fontSize: "11px", textTransform: "uppercase", letterSpacing: "0.1em", margin: "0 0 6px", fontWeight: 600 }}>{i === 2 ? "La distinction clé" : "Ce que ça n'interdit pas"}</p>
                  <p style={{ color: C.text, lineHeight: 1.6, margin: 0 }}>{p.allows}</p>
                </div>
              </div>
            </div>
          ))}
        </div>
        <blockquote style={{ borderLeft: `4px solid ${C.gold}`, paddingLeft: "20px", margin: "28px 0", fontStyle: "italic", color: C.navy, fontSize: "17px", lineHeight: 1.7, fontFamily: "'DM Sans',sans-serif" }}>
          « Exclure des pratiques auxquelles le patient a recours, c'est le perdre. Valider sans informer, c'est le tromper. ARCHIPEL choisit la troisième voie : intégrer et informer. »
        </blockquote>
        <div style={{ background: C.navy, borderRadius: "6px", padding: "20px 24px", borderLeft: `3px solid ${C.gold}` }}>
          <p style={{ fontFamily: "'DM Sans',sans-serif", fontSize: "15px", color: C.cream, lineHeight: 1.6, margin: 0 }}>
            <strong style={{ color: C.gold }}>Ancrage institutionnel :</strong> Ces trois principes sont formalisés dans le Cadre Déontologique de Non-substitution (v1, février 2026, validé par Dr Anne-Sophie Darrigade). Ils s'appliquent à Iris, au Sherpa, et à tous les membres de La Guilde.
          </p>
        </div>
      </Wrap>
    </section>
  );
};

/* ═══════════════════════════════════════════════════════
   [5] CE QUE LE PATIENT EN SAIT — Ethos→Logos
   ═══════════════════════════════════════════════════════ */
const PatientSection = () => {
  const qa = [
    { q: "\"Est-ce qu'ARCHIPEL valide toutes les pratiques sans distinction ?\"", a: "Non. ARCHIPEL vous donne le niveau de preuve de chaque pratique intégrée dans votre parcours — à partir du cadre des 3 niveaux. Vous savez toujours dans quel registre vous vous trouvez." },
    { q: "\"Est-ce qu'ARCHIPEL m'orientera vers des pratiques non-conventionnelles sans m'en informer ?\"", a: "Non. Chaque orientation vers une pratique de Niveau 2 ou 3 s'accompagne d'une information explicite sur la nature de la validation. Vous choisissez en connaissance de cause." },
    { q: "\"Est-ce qu'ARCHIPEL peut m'encourager à remplacer un traitement médical par une alternative ?\"", a: "Non. C'est la Règle 1 de notre cadre déontologique : ARCHIPEL ne prescrit pas, n'arbitre pas, ne recommande pas un traitement au détriment d'un autre. En cas de conflit, le gradient clinique s'applique." },
    { q: "\"Est-ce qu'ARCHIPEL juge les pratiques que j'utilise déjà ?\"", a: "Non. Si vous consultez un praticien de médecine traditionnelle, ARCHIPEL l'intègre dans votre parcours coordonné — avec votre consentement, et avec l'information sur le niveau de preuve. Sans jugement." },
    { q: "\"Comment puis-je vérifier que ces principes s'appliquent réellement ?\"", a: "Le Cadre Déontologique de Non-substitution (février 2026) est disponible sur demande. Notre Comité Éthique, hébergé exclusivement au sein de la Fondation pour éviter tout conflit d'intérêt, en assure la supervision indépendante." },
  ];
  return (
    <section style={{ background: C.white, padding: "80px 24px" }}>
      <Wrap max={860}>
        <h2 style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: "clamp(24px,3.5vw,36px)", fontWeight: 400, color: C.navy, margin: "0 0 8px" }}>Ce que ça change, concrètement, pour vous</h2>
        <p style={{ fontSize: "17px", color: C.text, fontFamily: "'DM Sans',sans-serif", margin: "0 0 32px", lineHeight: 1.7 }}>
          Ces principes ne restent pas dans les documents internes. Ils se traduisent dans chaque interaction avec Iris et avec votre Sherpa.
        </p>
        <div style={{ display: "flex", flexDirection: "column", gap: "0" }}>
          {qa.map((item, i) => (
            <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 1fr", borderBottom: i < qa.length - 1 ? `1px solid ${C.cream}` : "none" }}>
              <div style={{ padding: "18px 20px", background: "#f0f4f8", fontStyle: "italic", fontSize: "15px", color: C.navy, lineHeight: 1.6, fontFamily: "'DM Sans',sans-serif" }}>{item.q}</div>
              <div style={{ padding: "18px 20px", fontSize: "15px", color: C.text, lineHeight: 1.6, fontFamily: "'DM Sans',sans-serif" }}>{item.a}</div>
            </div>
          ))}
        </div>
      </Wrap>
    </section>
  );
};

/* ═══════════════════════════════════════════════════════
   [6] CTA DIFFÉRENCIÉ — Neutre, pas de conversion
   ═══════════════════════════════════════════════════════ */
const CTASection = () => {
  const paths = [
    { who: "Chercheur, journaliste, ou question précise", action: "→ Écrire à notre équipe : contact@archipel.foundation — Nous répondons personnellement. Cadre Déontologique disponible sur demande." },
    { who: "Praticien de santé", action: "→ Découvrir La Guilde — Cadre déontologique, profils recherchés, processus de candidature." },
    { who: "Patient ou futur accompagné", action: "→ Découvrir Le Cercle — Votre Sherpa, Iris, et la coordination de praticiens." },
  ];
  return (
    <section style={{ background: C.teal, padding: "60px 24px" }}>
      <Wrap max={700}>
        <h2 style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: "clamp(22px,3vw,32px)", fontWeight: 400, color: C.ivory, textAlign: "center", margin: "0 0 28px" }}>Selon votre profil</h2>
        <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
          {paths.map((p, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", padding: "16px 20px", background: "rgba(255,255,255,0.06)", borderRadius: "6px", gap: "20px", flexWrap: "wrap" }}>
              <span style={{ color: C.cream, fontSize: "15px", fontFamily: "'DM Sans',sans-serif", fontStyle: "italic", flex: "0 0 auto", maxWidth: "220px" }}>{p.who}</span>
              <span style={{ color: C.ivory, fontSize: "15px", fontFamily: "'DM Sans',sans-serif", flex: "1 1 auto" }}>{p.action}</span>
            </div>
          ))}
        </div>
        <p style={{ textAlign: "center", fontSize: "15px", color: C.cream, fontFamily: "'DM Sans',sans-serif", marginTop: "28px", opacity: 0.7 }}>
          Comprendre les bases scientifiques et philosophiques → <span style={{ textDecoration: "underline", cursor: "pointer" }}>/fondements</span>
        </p>
      </Wrap>
    </section>

};

/* ═══════════════════════════════════════════════════════
   TECH PANEL
   ═══════════════════════════════════════════════════════ */

          <p><strong>Pathos :</strong> Absent — la sobriété est l'argument</p>
          <p><strong>Sections :</strong> 6 (Hero, Tension, Niveaux de preuve, Triptyque, FAQ patient, CTA)</p>
          <hr style={{ border: "none", borderTop: `1px solid rgba(219,184,120,0.3)`, margin: "12px 0" }} />
          <p><strong>Hero :</strong> Fond blanc (rupture avec tous les autres Hero)</p>
          <p><strong>Niveaux de preuve :</strong> 3 niveaux publics simplifiés (ARB-AP-03)</p>
          <p><strong>Triptyque :</strong> Rigueur•Transparence•Non-jugement — validé 02/02/2026</p>
          <p><strong>ASD nommée :</strong> Sections [4] et [5]</p>
          <hr style={{ border: "none", borderTop: `1px solid rgba(219,184,120,0.3)`, margin: "12px 0" }} />
          <p><strong>PENDING :</strong> ASD exemples niveaux [3], ASD formulation 3 niveaux, statut Cadre Déonto (public ou sur demande)</p>

/* ═══════════════════════════════════════════════════════ */
function ApprochePage() {
  return (
    <div style={{ fontFamily: "'DM Sans','Cormorant Garamond',sans-serif" }}>
